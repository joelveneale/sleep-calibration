<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sleep Calibration Dashboard</title>
  <style>body { margin: 0; padding: 0; background: #0c0c10; }</style>
  <script>
    window.storage = {
      get: function(key) {
        var val = localStorage.getItem("sc:" + key);
        if (val === null) return Promise.reject(new Error("Key not found"));
        return Promise.resolve({ key: key, value: val });
      },
      set: function(key, value) {
        localStorage.setItem("sc:" + key, value);
        return Promise.resolve({ key: key, value: value });
      },
      delete: function(key) {
        localStorage.removeItem("sc:" + key);
        return Promise.resolve({ key: key, deleted: true });
      },
      list: function(prefix) {
        var keys = [];
        for (var i = 0; i < localStorage.length; i++) {
          var k = localStorage.key(i);
          if (k.indexOf("sc:" + (prefix || "")) === 0) {
            keys.push(k.slice(3));
          }
        }
        return Promise.resolve({ keys: keys });
      }
    };
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom": "https://esm.sh/react-dom@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",

    }
  }
  </script>
  <script type="module">
import React, { useState, useCallback, useEffect, createElement as h } from "react";
import { createRoot } from "react-dom/client";
import {
  LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid,
  Tooltip, ResponsiveContainer
} from "recharts";

// ============================================================
// DATA PROCESSING
// ============================================================

function parseBangleCSV(text, filename) {
  const lines = text.trim().split("\n");
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(",");
    if (cols[0] === "ts" || cols.length < 13) continue;
    const ts = parseInt(cols[0]);
    if (isNaN(ts)) continue;
    rows.push({
      ts, date: new Date(cols[1].replace("Z", "")),
      ax: parseFloat(cols[2]), ay: parseFloat(cols[3]), az: parseFloat(cols[4]),
      adiff: parseFloat(cols[5]), amag: parseFloat(cols[6]),
      steps: parseInt(cols[7]), bpm: parseInt(cols[8]), hrconf: parseInt(cols[9]),
      temp: parseFloat(cols[10]), press: parseFloat(cols[11]), alt: parseFloat(cols[12]),
    });
  }
  const match = filename.match(/sllog_(\d{4}-\d{2}-\d{2})/);
  return { rows, fileDate: match ? match[1] : null, filename };
}

function parseActivityCSV(text, filename) {
  const lines = text.trim().split("\n");
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(",");
    if (cols[0] === "ts" || cols.length < 9) continue;
    const ts = parseInt(cols[0]);
    if (isNaN(ts)) continue;
    rows.push({
      ts, date: new Date(cols[1].replace("Z", "")),
      ax: parseFloat(cols[2]), ay: parseFloat(cols[3]), az: parseFloat(cols[4]),
      adiff: parseFloat(cols[5]), amag: parseFloat(cols[6]),
      bpm: parseInt(cols[7]), hrconf: parseInt(cols[8]),
    });
  }
  const match = filename.match(/act_(\d{4}-\d{2}-\d{2})_(\d{4})/);
  const fileId = match ? match[1] + "_" + match[2] : filename;
  const goodHR = rows.filter(r => r.hrconf > 50 && r.bpm > 0);
  const hrValues = goodHR.map(r => r.bpm);
  const summary = {
    startTime: rows.length > 0 ? rows[0].date : null,
    endTime: rows.length > 0 ? rows[rows.length - 1].date : null,
    durationMin: rows.length > 1 ? Math.round((rows[rows.length - 1].ts - rows[0].ts) / 60) : 0,
    avgHR: hrValues.length ? Math.round(mean(hrValues)) : null,
    maxHR: hrValues.length ? Math.max(...hrValues) : null,
    samples: rows.length,
  };
  return { rows, fileDate: match ? match[1] : null, fileTime: match ? match[2] : null, fileId, filename, summary };
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.trim());
  return lines.slice(1).map(line => {
    const cols = line.split(",");
    const row = {};
    headers.forEach((hdr, i) => { row[hdr] = cols[i]?.trim() || ""; });
    return row;
  });
}

function median(arr) {
  if (!arr.length) return null;
  const s = [...arr].sort((a, b) => a - b);
  const mid = Math.floor(s.length / 2);
  return s.length % 2 ? s[mid] : (s[mid - 1] + s[mid]) / 2;
}

function quantile(arr, q) {
  const s = [...arr].sort((a, b) => a - b);
  const pos = (s.length - 1) * q;
  const base = Math.floor(pos);
  const rest = pos - base;
  return s[base + 1] !== undefined ? s[base] + rest * (s[base + 1] - s[base]) : s[base];
}

function mean(arr) {
  return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0;
}

function pairNights(bangleFiles, sleeps, physio) {
  const bangleByDate = {};
  for (const bf of bangleFiles) {
    if (bf.fileDate && bf.rows.length > 0) bangleByDate[bf.fileDate] = bf.rows;
  }
  const pairs = [];
  const seen = new Set();
  for (const ws of sleeps) {
    if (!ws["Sleep onset"] || !ws["Wake onset"]) continue;
    const onsetDateStr = ws["Sleep onset"].split(" ")[0];
    if (seen.has(onsetDateStr)) continue;
    seen.add(onsetDateStr);
    const wp = physio.find(p => p["Sleep onset"]?.startsWith(onsetDateStr));
    const sleepOnset = new Date(ws["Sleep onset"].replace(" ", "T"));
    const wakeOnset = new Date(ws["Wake onset"].replace(" ", "T"));
    const nextDate = new Date(sleepOnset);
    nextDate.setUTCDate(nextDate.getUTCDate() + 1);
    const nextDateStr = nextDate.toISOString().split("T")[0];
    const allRows = [...(bangleByDate[onsetDateStr] || []), ...(bangleByDate[nextDateStr] || [])];
    const sleepRows = allRows.filter(r => r.date >= sleepOnset && r.date <= wakeOnset);
    if (sleepRows.length < 5) continue;
    const goodHR = sleepRows.filter(r => r.hrconf > 50 && r.bpm > 0);
    const hrValues = goodHR.map(r => r.bpm);
    pairs.push({
      night: onsetDateStr,
      bangle: {
        sleepRows, goodHR,
        medianHR: hrValues.length ? median(hrValues) : null,
        minHR: hrValues.length ? Math.min(...hrValues) : null,
        meanTemp: mean(sleepRows.map(r => r.temp)),
        meanMove: mean(sleepRows.map(r => r.adiff)),
        goodHRPct: Math.round((goodHR.length / sleepRows.length) * 100),
      },
      whoop: {
        sleepOnset: ws["Sleep onset"], wakeOnset: ws["Wake onset"],
        totalMin: parseInt(ws["Asleep duration (min)"]) || 0,
        deepMin: parseInt(ws["Deep (SWS) duration (min)"]) || 0,
        lightMin: parseInt(ws["Light sleep duration (min)"]) || 0,
        remMin: parseInt(ws["REM duration (min)"]) || 0,
        awakeMin: parseInt(ws["Awake duration (min)"]) || 0,
        efficiency: parseInt(ws["Sleep efficiency %"]) || 0,
        restingHR: wp ? parseFloat(wp["Resting heart rate (bpm)"]) : null,
        skinTemp: wp ? parseFloat(wp["Skin temp (celsius)"]) : null,
        hrv: wp ? parseFloat(wp["Heart rate variability (ms)"]) : null,
      },
    });
  }
  return pairs.sort((a, b) => a.night.localeCompare(b.night));
}

function detectSleepInternal(rows, model) {
  if (!model || rows.length < 10) return null;
  const mins = { deep: 0, light: 0, awake: 0, unknown: 0 };
  for (let i = 0; i < rows.length; i += 5) {
    const chunk = rows.slice(i, i + 5);
    const goodHR = chunk.filter(r => r.hrconf > 50 && r.bpm > 0);
    const avgMove = mean(chunk.map(r => r.adiff));
    const avgHR = goodHR.length ? mean(goodHR.map(r => r.bpm)) : null;
    const avgTemp = mean(chunk.map(r => r.temp));
    let stage = "unknown";
    if (avgHR !== null) {
      if (avgMove > model.move.wake || avgHR > model.hr.wake) stage = "awake";
      else if (avgHR <= model.hr.deep && avgMove <= model.move.asleep && avgTemp >= (model.temp?.deep || 0)) stage = "deep";
      else stage = "light";
    }
    mins[stage] += 5;
  }
  return { mins };
}

function buildModel(pairs) {
  if (!pairs.length) return null;
  const hrOffsets = pairs.filter(p => p.bangle.medianHR && p.whoop.restingHR).map(p => p.whoop.restingHR - p.bangle.medianHR);
  const tempOffsets = pairs.filter(p => p.bangle.meanTemp && p.whoop.skinTemp && !isNaN(p.whoop.skinTemp)).map(p => p.whoop.skinTemp - p.bangle.meanTemp);
  const allMoves = pairs.flatMap(p => p.bangle.sleepRows.map(r => r.adiff));
  const allHR = pairs.flatMap(p => p.bangle.goodHR.map(r => r.bpm));
  const allTemps = pairs.flatMap(p => p.bangle.sleepRows.map(r => r.temp));

  let bestScore = Infinity, bestParams = null;
  for (const dp of [0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50]) {
    for (const mp of [0.85, 0.90, 0.93, 0.95, 0.97]) {
      for (const tp of [0.40, 0.50, 0.60, 0.70, 0.80]) {
        const cm = {
          hr: { deep: allHR.length ? quantile(allHR, dp) : 48, resting: allHR.length ? median(allHR) : 52, light: allHR.length ? quantile(allHR, 0.75) : 56, wake: (allHR.length ? quantile(allHR, 0.75) : 56) + 15 },
          move: { asleep: allMoves.length ? median(allMoves) : 0.03, restless: allMoves.length ? quantile(allMoves, 0.75) : 0.05, wake: allMoves.length ? quantile(allMoves, mp) : 0.08 },
          temp: { deep: allTemps.length ? quantile(allTemps, tp) : 34 },
        };
        let totalError = 0;
        for (const pair of pairs) {
          const det = detectSleepInternal(pair.bangle.sleepRows, cm);
          if (!det) continue;
          totalError += Math.abs(det.mins.deep - pair.whoop.deepMin) + Math.abs(det.mins.light - (pair.whoop.lightMin + pair.whoop.remMin)) + Math.abs(det.mins.awake - pair.whoop.awakeMin);
        }
        if (totalError < bestScore) { bestScore = totalError; bestParams = { dp, mp, tp }; }
      }
    }
  }
  const bp = bestParams || { dp: 0.35, mp: 0.95, tp: 0.60 };
  return {
    hrOffset: hrOffsets.length ? mean(hrOffsets) : 0,
    hrOffsetRange: hrOffsets.length ? [Math.min(...hrOffsets), Math.max(...hrOffsets)] : [0, 0],
    tempOffset: tempOffsets.length ? mean(tempOffsets) : 0,
    tempOffsetRange: tempOffsets.length ? [Math.min(...tempOffsets), Math.max(...tempOffsets)] : [0, 0],
    move: { asleep: allMoves.length ? median(allMoves) : 0.03, restless: allMoves.length ? quantile(allMoves, 0.75) : 0.05, wake: allMoves.length ? quantile(allMoves, bp.mp) : 0.08 },
    hr: { deep: allHR.length ? quantile(allHR, bp.dp) : 48, resting: allHR.length ? median(allHR) : 52, light: allHR.length ? quantile(allHR, 0.75) : 56, wake: (allHR.length ? quantile(allHR, 0.75) : 56) + 15 },
    temp: { deep: allTemps.length ? quantile(allTemps, bp.tp) : 34 },
    nightsUsed: pairs.length,
    optimisation: { deepHRPct: bp.dp, wakeMovePct: bp.mp, tempPct: bp.tp, avgErrorMin: pairs.length > 0 ? Math.round(bestScore / pairs.length) : 0 },
  };
}

function detectSleep(rows, model) {
  if (!model || rows.length < 10) return null;
  const wins = [];
  for (let i = 0; i < rows.length; i += 5) {
    const chunk = rows.slice(i, i + 5);
    const goodHR = chunk.filter(r => r.hrconf > 50 && r.bpm > 0);
    const avgMove = mean(chunk.map(r => r.adiff));
    const avgHR = goodHR.length ? mean(goodHR.map(r => r.bpm)) : null;
    const avgTemp = mean(chunk.map(r => r.temp));
    const localTime = new Date(chunk[0].date.getTime());
    const label = localTime.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
    let stage = "unknown";
    if (avgHR !== null) {
      if (avgMove > model.move.wake || avgHR > model.hr.wake) stage = "awake";
      else if (avgHR <= model.hr.deep && avgMove <= model.move.asleep && avgTemp >= (model.temp?.deep || 0)) stage = "deep";
      else stage = "light";
    }
    wins.push({ label, stage, avgHR, avgMove, avgTemp });
  }
  for (let i = 1; i < wins.length - 1; i++) {
    if (wins[i].stage !== wins[i - 1].stage && wins[i].stage !== wins[i + 1].stage) wins[i].stage = wins[i - 1].stage;
  }
  const mins = { deep: 0, light: 0, awake: 0, unknown: 0 };
  wins.forEach(w => { mins[w.stage] = (mins[w.stage] || 0) + 5; });
  return { wins, mins };
}

function pairActivities(activityFiles, workouts) {
  const pairs = [];
  for (const af of activityFiles) {
    if (!af.summary.startTime) continue;
    let bestMatch = null, bestOverlap = 0;
    for (const w of workouts) {
      if (!w["Workout start time"] || !w["Workout end time"]) continue;
      const wStart = new Date(w["Workout start time"].replace(" ", "T"));
      const wEnd = new Date(w["Workout end time"].replace(" ", "T"));
      const overlap = Math.min(af.summary.endTime.getTime(), wEnd.getTime()) - Math.max(af.summary.startTime.getTime(), wStart.getTime());
      if (overlap > bestOverlap) { bestOverlap = overlap; bestMatch = w; }
    }
    pairs.push({
      id: af.fileId, bangle: { ...af.summary, rows: af.rows },
      whoop: bestMatch ? {
        startTime: bestMatch["Workout start time"], endTime: bestMatch["Workout end time"],
        durationMin: parseInt(bestMatch["Duration (min)"]) || 0, activity: bestMatch["Activity name"] || "Unknown",
        strain: parseFloat(bestMatch["Activity Strain"]) || 0, calories: parseFloat(bestMatch["Energy burned (cal)"]) || 0,
        maxHR: parseInt(bestMatch["Max HR (bpm)"]) || null, avgHR: parseInt(bestMatch["Average HR (bpm)"]) || null,
      } : null, matched: !!bestMatch,
    });
  }
  return pairs.sort((a, b) => (b.bangle.startTime?.getTime() || 0) - (a.bangle.startTime?.getTime() || 0));
}

// ============================================================
// STYLES
// ============================================================
const BG = "#0c0c10", CARD = "rgba(255,255,255,0.03)", BORDER = "rgba(255,255,255,0.06)";
const TEXT = "#d4d4d8", TEXT2 = "#71717a", TEXT3 = "#52525b";
const PURPLE = "#534AB7", PURPLE_L = "#AFA9EC", GREEN = "#1D9E75", ORANGE = "#D85A30";
const BLUE_D = "#185FA5", BLUE_L = "#85B7EB", RED = "#E24B4A", GREY = "#888780";
const FONT = "'DM Sans', system-ui, sans-serif", MONO = "'JetBrains Mono', 'SF Mono', monospace";
const stageColor = { deep: BLUE_D, light: BLUE_L, awake: RED, unknown: GREY };

// ============================================================
// APP
// ============================================================

function App() {
  const [bangleFiles, setBangleFiles] = useState([]);
  const [activityFiles, setActivityFiles] = useState([]);
  const [sleeps, setSleeps] = useState([]);
  const [physio, setPhysio] = useState([]);
  const [workouts, setWorkouts] = useState([]);
  const [pairs, setPairs] = useState([]);
  const [actPairs, setActPairs] = useState([]);
  const [model, setModel] = useState(null);
  const [selectedNight, setSelectedNight] = useState(null);
  const [selectedActivity, setSelectedActivity] = useState(null);
  const [tab, setTab] = useState("overview");
  const [loading, setLoading] = useState(false);
  const [storageReady, setStorageReady] = useState(false);
  const [statusMsg, setStatusMsg] = useState("");

  useEffect(() => {
    const link = document.createElement("link");
    link.href = "https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400&display=swap";
    link.rel = "stylesheet";
    document.head.appendChild(link);
  }, []);

  // Load stored data
  useEffect(() => {
    async function load() {
      setLoading(true);
      try {
        try { const r = await window.storage.get("bangle-index"); const dates = JSON.parse(r.value); const loaded = [];
          for (const d of dates) { try { const s = await window.storage.get("bangle:" + d); if (s) loaded.push(parseBangleCSV(s.value, "sllog_" + d + ".csv")); } catch(e){} }
          if (loaded.length > 0) setBangleFiles(loaded);
        } catch(e){}
        try { const r = await window.storage.get("whoop-sleeps"); if (r) setSleeps(parseCSV(r.value)); } catch(e){}
        try { const r = await window.storage.get("whoop-physio"); if (r) setPhysio(parseCSV(r.value)); } catch(e){}
        try { const r = await window.storage.get("whoop-workouts"); if (r) setWorkouts(parseCSV(r.value)); } catch(e){}
        try { const r = await window.storage.get("act-index"); const ids = JSON.parse(r.value); const loaded = [];
          for (const id of ids) { try { const s = await window.storage.get("act:" + id); if (s) loaded.push(parseActivityCSV(s.value, "act_" + id + ".csv")); } catch(e){} }
          if (loaded.length > 0) setActivityFiles(loaded);
        } catch(e){}
      } catch(e){}
      setLoading(false);
      setStorageReady(true);
    }
    load();
  }, []);

  // Save bangle files
  useEffect(() => {
    if (!storageReady || bangleFiles.length === 0) return;
    (async () => { try {
      await window.storage.set("bangle-index", JSON.stringify(bangleFiles.map(f => f.fileDate).filter(Boolean)));
      for (const bf of bangleFiles) { if (!bf.fileDate) continue;
        const hdr = "ts,date,ax,ay,az,adiff,amag,steps,bpm,hrconf,temp,press,alt";
        const lines = bf.rows.map(r => [r.ts, r.date.toISOString(), r.ax, r.ay, r.az, r.adiff, r.amag, r.steps, r.bpm, r.hrconf, r.temp, r.press, r.alt].join(","));
        await window.storage.set("bangle:" + bf.fileDate, [hdr, ...lines].join("\n"));
      }
    } catch(e){} })();
  }, [bangleFiles, storageReady]);

  // Save whoop
  useEffect(() => {
    if (!storageReady) return;
    (async () => { try {
      if (sleeps.length > 0) { const h = Object.keys(sleeps[0]).join(","); const l = sleeps.map(r => Object.values(r).join(",")); await window.storage.set("whoop-sleeps", [h,...l].join("\n")); }
      if (physio.length > 0) { const h = Object.keys(physio[0]).join(","); const l = physio.map(r => Object.values(r).join(",")); await window.storage.set("whoop-physio", [h,...l].join("\n")); }
    } catch(e){} })();
  }, [sleeps, physio, storageReady]);

  useEffect(() => {
    if (!storageReady || workouts.length === 0) return;
    (async () => { try { const h = Object.keys(workouts[0]).join(","); const l = workouts.map(r => Object.values(r).join(",")); await window.storage.set("whoop-workouts", [h,...l].join("\n")); } catch(e){} })();
  }, [workouts, storageReady]);

  useEffect(() => {
    if (!storageReady || activityFiles.length === 0) return;
    (async () => { try {
      await window.storage.set("act-index", JSON.stringify(activityFiles.map(f => f.fileId).filter(Boolean)));
      for (const af of activityFiles) { if (!af.fileId) continue;
        const hdr = "ts,date,ax,ay,az,adiff,amag,bpm,hrconf";
        const lines = af.rows.map(r => [r.ts, r.date.toISOString(), r.ax, r.ay, r.az, r.adiff, r.amag, r.bpm, r.hrconf].join(","));
        await window.storage.set("act:" + af.fileId, [hdr, ...lines].join("\n"));
      }
    } catch(e){} })();
  }, [activityFiles, storageReady]);

  // Pair data
  useEffect(() => {
    if (bangleFiles.length > 0 && sleeps.length > 0) {
      const p = pairNights(bangleFiles, sleeps, physio);
      setPairs(p); setModel(buildModel(p));
      if (p.length > 0 && !selectedNight) setSelectedNight(p[p.length - 1].night);
    }
    if (activityFiles.length > 0) {
      const ap = pairActivities(activityFiles, workouts);
      setActPairs(ap);
      if (ap.length > 0 && !selectedActivity) setSelectedActivity(ap[0].id);
    }
  }, [bangleFiles, sleeps, physio, activityFiles, workouts]);

  const handleBangle = useCallback((e) => {
    Promise.all(Array.from(e.target.files).map(f => new Promise(res => {
      const r = new FileReader(); r.onload = () => res({ name: f.name, text: r.result }); r.readAsText(f);
    }))).then(results => {
      const newSleep = [], newAct = [];
      for (const r of results) {
        if (r.name.includes("act_")) newAct.push(parseActivityCSV(r.text, r.name));
        else newSleep.push(parseBangleCSV(r.text, r.name));
      }
      if (newSleep.length > 0) setBangleFiles(prev => { const ex = new Set(prev.map(f => f.fileDate)); const nf = newSleep.filter(f => f.fileDate && !ex.has(f.fileDate)); if (nf.length) { setStatusMsg("Added " + nf.length + " sleep file(s)"); setTimeout(() => setStatusMsg(""), 3000); } return [...prev, ...nf]; });
      if (newAct.length > 0) setActivityFiles(prev => { const ex = new Set(prev.map(f => f.fileId)); const nf = newAct.filter(f => f.fileId && !ex.has(f.fileId)); if (nf.length) { setStatusMsg("Added " + nf.length + " activity file(s)"); setTimeout(() => setStatusMsg(""), 3000); } return [...prev, ...nf]; });
    });
  }, []);

  const handleWhoop = useCallback((e) => {
    Array.from(e.target.files).forEach(file => {
      const r = new FileReader();
      r.onload = () => {
        const n = file.name.toLowerCase();
        if (n.includes("sleep")) { setSleeps(parseCSV(r.result)); setStatusMsg("Sleep data updated"); }
        else if (n.includes("physio")) { setPhysio(parseCSV(r.result)); setStatusMsg("Physio data updated"); }
        else if (n.includes("workout")) { setWorkouts(parseCSV(r.result)); setStatusMsg("Workout data updated"); }
        setTimeout(() => setStatusMsg(""), 3000);
      };
      r.readAsText(file);
    });
  }, []);

  const handleClear = useCallback(async () => {
    if (!confirm("Clear all saved data?")) return;
    try {
      const bk = await window.storage.list("bangle:"); if (bk) for (const k of bk.keys) await window.storage.delete(k);
      const ak = await window.storage.list("act:"); if (ak) for (const k of ak.keys) await window.storage.delete(k);
      for (const k of ["bangle-index","act-index","whoop-sleeps","whoop-physio","whoop-workouts"]) try { await window.storage.delete(k); } catch(e){}
    } catch(e){}
    setBangleFiles([]); setActivityFiles([]); setSleeps([]); setPhysio([]); setWorkouts([]); setPairs([]); setActPairs([]); setModel(null);
    setStatusMsg("Data cleared"); setTimeout(() => setStatusMsg(""), 3000);
  }, []);

  const selPair = pairs.find(p => p.night === selectedNight);
  const selAct = actPairs.find(a => a.id === selectedActivity);
  const detection = selPair && model ? detectSleep(selPair.bangle.sleepRows, model) : null;

  const nightChartData = selPair ? (() => {

          h("span", { style: { fontSize: "11px", color: TEXT2, textTransform: "uppercase", letterSpacing: "0.05em" } }, "Bangle CSVs"),

      statusMsg && h("div", { style: { fontSize: "12px", color: GREEN, textAlign: "center", marginBottom: "12px", fontFamily: MONO } }, statusMsg),

      loading && h("div", { style: { textAlign: "center", padding: "40px", color: TEXT2 } }, "Loading..."),

        h("div", { style: { display: "flex", gap: 0, marginBottom: "24px", borderBottom: `1px solid ${BORDER}` } },

          h(Legend, { items: [[PURPLE, "Bangle median"], [PURPLE_L, "Whoop resting"]] }),
          h("div", { style: { fontSize: "12px", color: TEXT2, marginBottom: "8px", marginTop: "24px", textTransform: "uppercase", letterSpacing: "0.04em" } }, "Whoop sleep stages"),
          h(ResponsiveContainer, { width: "100%", height: 180 },
            h(BarChart, { data: stageData },
              h(CartesianGrid, { stroke: "rgba(128,128,128,0.1)", strokeDasharray: "3 3" }),
              h(XAxis, { dataKey: "night", tick: { fontSize: 10, fill: TEXT2 } }),
              h(YAxis, { tick: { fontSize: 10, fill: TEXT2 } }),

            ...pairs.map(p => h("button", { key: p.night, onClick: () => setSelectedNight(p.night), style: { background: selectedNight === p.night ? PURPLE : "rgba(255,255,255,0.05)", border: "none", color: selectedNight === p.night ? "#fff" : "#a1a1aa", padding: "6px 12px", borderRadius: "6px", fontSize: "12px", cursor: "pointer", fontFamily: MONO } }, p.night.slice(5)))),

            h("div", { style: { fontSize: "12px", color: TEXT2, marginBottom: "8px", textTransform: "uppercase", letterSpacing: "0.04em" } }, "Overnight HR + movement"),
            h(ResponsiveContainer, { width: "100%", height: 180 },
              h(LineChart, { data: nightChartData },
                h(CartesianGrid, { stroke: "rgba(128,128,128,0.1)", strokeDasharray: "3 3" }),
                h(XAxis, { dataKey: "time", tick: { fontSize: 9, fill: TEXT2 }, interval: "preserveStartEnd" }),
                h(YAxis, { yAxisId: "hr", domain: [40, 110], tick: { fontSize: 10, fill: TEXT2 } }),

                h(Line, { yAxisId: "mv", dataKey: "move", stroke: GREEN, strokeWidth: 1, dot: false, strokeDasharray: "4 3" }))),
            h(Legend, { items: [[PURPLE, "Heart rate"], [GREEN, "Movement"]] }),
            detection && h("div", { style: { marginTop: "20px" } },
              h("div", { style: { fontSize: "12px", color: TEXT2, marginBottom: "8px", textTransform: "uppercase", letterSpacing: "0.04em" } }, "Bangle sleep detection"),
              h("div", { style: { display: "flex", borderRadius: "6px", overflow: "hidden", height: "32px" } },
                ...detection.wins.map((w, i) => h("div", { key: i, style: { flex: 1, background: stageColor[w.stage], borderRight: i < detection.wins.length - 1 ? "1px solid rgba(0,0,0,0.3)" : "none" }, title: w.label + ": " + w.stage }))),
              h("div", { style: { display: "flex", justifyContent: "space-between", marginTop: "4px", fontSize: "10px", color: TEXT3, fontFamily: MONO } },
                h("span", null, detection.wins[0]?.label), h("span", null, detection.wins[detection.wins.length - 1]?.label)),
              h("div", { style: { display: "flex", gap: "12px", marginTop: "8px", fontSize: "11px", color: TEXT2 } },
                h("span", null, "Deep: " + detection.mins.deep + "m"), h("span", null, "Light: " + detection.mins.light + "m"), h("span", null, "Awake: " + detection.mins.awake + "m")),
              h("div", { style: { fontSize: "11px", color: TEXT3, marginTop: "4px" } },
                "Whoop → Deep: " + selPair.whoop.deepMin + "m · Light: " + (selPair.whoop.lightMin + selPair.whoop.remMin) + "m · Awake: " + selPair.whoop.awakeMin + "m"),
              h(Legend, { items: [[BLUE_D, "Deep"], [BLUE_L, "Light"], [RED, "Awake"]] })))),

        // ACTIVITY
        tab === "activity" && h("div", null,
          h("div", { style: { display: "flex", gap: "6px", marginBottom: "20px", flexWrap: "wrap" } },
            ...actPairs.map(a => h("button", { key: a.id, onClick: () => setSelectedActivity(a.id), style: { background: selectedActivity === a.id ? RED : "rgba(255,255,255,0.05)", border: "none", color: selectedActivity === a.id ? "#fff" : "#a1a1aa", padding: "6px 12px", borderRadius: "6px", fontSize: "12px", cursor: "pointer", fontFamily: MONO } },
              a.id.slice(5), a.whoop && h("span", { style: { marginLeft: "6px", opacity: 0.6 } }, a.whoop.activity)))),
          selAct && h("div", null,
            h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "1px", background: BORDER, borderRadius: "10px", overflow: "hidden", marginBottom: "20px" } },
              ...[{ l: "Bangle duration", v: selAct.bangle.durationMin, u: "min" }, { l: "Whoop duration", v: selAct.whoop ? selAct.whoop.durationMin : "—", u: selAct.whoop ? "min" : "" },
                { l: "Bangle avg HR", v: selAct.bangle.avgHR || "—", u: selAct.bangle.avgHR ? "bpm" : "" }, { l: "Whoop avg HR", v: selAct.whoop ? selAct.whoop.avgHR : "—", u: selAct.whoop ? "bpm" : "" },
                { l: "Bangle max HR", v: selAct.bangle.maxHR || "—", u: selAct.bangle.maxHR ? "bpm" : "" }, { l: "Whoop max HR", v: selAct.whoop ? selAct.whoop.maxHR : "—", u: selAct.whoop ? "bpm" : "" }]
                .map((s, i) => h("div", { key: i, style: { background: BG, padding: "12px 16px" } },
                  h("div", { style: { fontSize: "10px", color: TEXT3, textTransform: "uppercase", letterSpacing: "0.04em" } }, s.l),
                  h("div", { style: { fontFamily: MONO, fontSize: "18px", fontWeight: 500, marginTop: "4px" } }, s.v, h("span", { style: { fontSize: "11px", color: TEXT3, marginLeft: "3px" } }, s.u))))),
            h("div", { style: { fontSize: "12px", color: TEXT2, marginBottom: "8px", textTransform: "uppercase", letterSpacing: "0.04em" } }, "Activity HR + movement"),
            h(ResponsiveContainer, { width: "100%", height: 200 },
              h(LineChart, { data: actChartData },
                h(CartesianGrid, { stroke: "rgba(128,128,128,0.1)", strokeDasharray: "3 3" }),
                h(XAxis, { dataKey: "time", tick: { fontSize: 9, fill: TEXT2 }, interval: "preserveStartEnd" }),
                h(YAxis, { yAxisId: "hr", domain: [40, 180], tick: { fontSize: 10, fill: TEXT2 } }),
                h(YAxis, { yAxisId: "mv", orientation: "right", domain: [0, 300], tick: { fontSize: 10, fill: TEXT2 } }),
                h(Tooltip, { contentStyle: { background: "#1a1a2e", border: "none", fontSize: 12 } }),
                h(Line, { yAxisId: "hr", dataKey: "hr", stroke: RED, strokeWidth: 1.5, dot: false, connectNulls: true }),
                h(Line, { yAxisId: "mv", dataKey: "move", stroke: GREEN, strokeWidth: 1, dot: false, strokeDasharray: "4 3" }))),
            h(Legend, { items: [[RED, "Heart rate"], [GREEN, "Movement"]] }))),

        tab === "model" && model && h("div", null,
          h("div", { style: { fontSize: "12px", color: TEXT2, marginBottom: "16px", textTransform: "uppercase", letterSpacing: "0.04em" } }, "Calibration model parameters"),
          h("pre", { style: { background: CARD, border: `1px solid ${BORDER}`, borderRadius: "10px", padding: "20px", fontFamily: MONO, fontSize: "13px", lineHeight: "2.2", color: TEXT, whiteSpace: "pre-wrap", margin: 0 } },
            "// Heart rate\n" +
            "hr_offset: " + model.hrOffset.toFixed(1) + " bpm\n" +
            "deep_threshold: <" + Math.round(model.hr.deep) + " bpm\n" +
            "resting_median: " + Math.round(model.hr.resting) + " bpm\n" +
            "wake_threshold: >" + Math.round(model.hr.wake) + " bpm\n\n" +
            "// Temperature\n" +
            "temp_offset: +" + model.tempOffset.toFixed(2) + " °C\n" +

            "// Movement (adiff)\n" +

            "restless: " + model.move.restless.toFixed(4) + "\n" +
            "wake: " + model.move.wake.toFixed(4) + "\n\n" +
            "// Optimisation\n" +
            "deep_hr_pct: " + (model.optimisation?.deepHRPct * 100 || 25).toFixed(0) + "%\n" +

      // Empty state
